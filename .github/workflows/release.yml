name: Release

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_DEBUG: 1   # keep symbols for perf profiling

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:   x86_64-unknown-linux-gnu
            os:       ubuntu-22.04
            artifact: open-wire-linux-amd64
            cross:    false

          - target:   aarch64-unknown-linux-gnu
            os:       ubuntu-22.04
            artifact: open-wire-linux-arm64
            cross:    true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (ARM64 only)
        if: ${{ matrix.cross }}
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Build (cross)
        if: ${{ matrix.cross }}
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target "$TARGET"

      - name: Stage artifacts
        env:
          ARTIFACT: ${{ matrix.artifact }}
          TARGET:   ${{ matrix.target }}
        run: |
          cp "target/${TARGET}/release/open-wire" "${ARTIFACT}"
          chmod +x "${ARTIFACT}"
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            open-wire-linux-amd64
            open-wire-linux-amd64.sha256
            open-wire-linux-arm64
            open-wire-linux-arm64.sha256
